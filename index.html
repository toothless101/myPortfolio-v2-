<!doctype html>
<html lang="en">
  <head>

  <body>
    <div id="app" class="max-w-4xl mx-auto px-4 py-8">
      <section class="mb-8">
        <div class="flex items-center gap-4 md:gap-6">
          <img class="rounded-lg w-40 h-40 md:w-40 md:h-40 object-cover shrink-0" height="160" width="160" src="/src/imgs/img1.jpg" alt="Hilary Mae Poralan">

            <div class="flex items-center justify-between mt-1.5 md:mt-2">

                  <i class="fa-solid fa-envelope"></i>
                  <span class="text-left">Send Email</span>
                </a>

        </div>
